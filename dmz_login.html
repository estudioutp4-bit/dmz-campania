<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DMZ – Acceso al Sistema</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap');
:root{--red:#C0392B;--yellow:#F5C400;--blue:#1A4E8A;--green:#27AE60;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Barlow',sans-serif;background:#0D0D0D;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}

/* animated background */
.bg{position:fixed;inset:0;overflow:hidden;z-index:0;}
.bg-stripe{position:absolute;width:200%;height:3px;opacity:.08;animation:slide 8s linear infinite;}
.bg-stripe:nth-child(1){top:15%;background:var(--yellow);animation-delay:0s;}
.bg-stripe:nth-child(2){top:35%;background:var(--red);animation-delay:-2s;}
.bg-stripe:nth-child(3){top:55%;background:var(--yellow);animation-delay:-4s;}
.bg-stripe:nth-child(4){top:75%;background:var(--red);animation-delay:-6s;}
@keyframes slide{from{transform:translateX(-50%)}to{transform:translateX(0%)}}

.login-wrap{position:relative;z-index:1;width:100%;max-width:360px;}

.logo-area{text-align:center;margin-bottom:32px;}
.logo-stripe{display:flex;justify-content:center;gap:3px;margin-bottom:16px;}
.ls{width:32px;height:6px;border-radius:1px;}
.logo-title{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;color:#fff;letter-spacing:3px;line-height:1;}
.logo-sub{font-size:10px;color:#444;letter-spacing:3px;text-transform:uppercase;margin-top:4px;}
.logo-badge{display:inline-block;background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;letter-spacing:2px;padding:3px 10px;margin-top:8px;}

.card{background:#161616;border-radius:4px;overflow:hidden;}
.card-header{background:var(--blue);padding:16px 20px;border-bottom:3px solid var(--yellow);}
.card-header h2{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:#fff;letter-spacing:2px;text-transform:uppercase;}
.card-header p{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px;letter-spacing:1px;}
.card-body{padding:20px;}

.role-tabs{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#0D0D0D;margin-bottom:20px;border-radius:3px;overflow:hidden;}
.role-tab{padding:10px;text-align:center;cursor:pointer;background:#1f1f1f;transition:all .2s;}
.role-tab.active{background:var(--yellow);}
.role-tab .ico{font-size:18px;display:block;margin-bottom:3px;}
.role-tab .lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#666;}
.role-tab.active .lbl{color:var(--blue);}

.flabel{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;}
.finput{width:100%;padding:11px 14px;background:#0D0D0D;border:1px solid #2a2a2a;border-radius:3px;color:#fff;font-family:'Barlow',sans-serif;font-size:14px;margin-bottom:14px;outline:none;transition:border-color .2s;}
.finput:focus{border-color:var(--yellow);}

.btn-login{width:100%;padding:14px;background:var(--yellow);color:#0D0D0D;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;border-radius:3px;transition:opacity .2s;}
.btn-login:active{opacity:.8;}

.error-msg{background:#2b0d0d;border:1px solid var(--red);border-radius:3px;padding:8px 12px;font-size:12px;color:#e74c3c;margin-bottom:12px;display:none;}

.hint{text-align:center;margin-top:14px;font-size:10px;color:#333;letter-spacing:1px;}

/* shake animation */
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .4s ease;}
</style>
</head>
<body>
<div class="bg">
  <div class="bg-stripe"></div><div class="bg-stripe"></div>
  <div class="bg-stripe"></div><div class="bg-stripe"></div>
</div>

<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-stripe">
      <div class="ls" style="background:var(--red)"></div>
      <div class="ls" style="background:var(--yellow)"></div>
      <div class="ls" style="background:var(--blue)"></div>
    </div>
    <div class="logo-title">DIMARZA</div>
    <div class="logo-sub">Sistema de Auditoría</div>
    <div class="logo-badge">CAMPAÑA PARADA DE PLANTA</div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Acceso al Sistema</h2>
      <p>Selecciona tu rol e ingresa tu contraseña</p>
    </div>
    <div class="card-body">
      <div class="role-tabs">
        <div class="role-tab active" id="tabAuditor" onclick="setRole('auditor')">
          <span class="ico">📋</span>
          <span class="lbl">Inspector</span>
        </div>
        <div class="role-tab" id="tabAdmin" onclick="setRole('admin')">
          <span class="ico">📊</span>
          <span class="lbl">Administrador</span>
        </div>
      </div>

      <div class="error-msg" id="errMsg">Contraseña incorrecta. Intenta de nuevo.</div>

      <div class="flabel">Contraseña</div>
      <input class="finput" type="password" id="passInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">

      <button class="btn-login" onclick="doLogin()">INGRESAR →</button>

      <div class="hint">¿Olvidaste la contraseña? Contacta al administrador.</div>
    </div>
  </div>
</div>

<script>
// ── CONTRASEÑAS — PUEDES CAMBIARLAS AQUÍ ──
const PASSWORDS = {
  auditor: 'dmz2024',      // contraseña para inspectores
  admin:   'dimarza2024'   // contraseña para administrador
};

let currentRole = 'auditor';

function setRole(role) {
  currentRole = role;
  document.getElementById('tabAuditor').classList.toggle('active', role==='auditor');
  document.getElementById('tabAdmin').classList.toggle('active', role==='admin');
  document.getElementById('passInput').value = '';
  document.getElementById('errMsg').style.display = 'none';
}

function doLogin() {
  const pass = document.getElementById('passInput').value;
  const err = document.getElementById('errMsg');

  if (pass === PASSWORDS[currentRole]) {
    sessionStorage.setItem('dmz_role', currentRole);
    sessionStorage.setItem('dmz_auth', 'true');
    if (currentRole === 'admin') {
      window.location.href = 'dmz_dashboard.html';
    } else {
      window.location.href = 'dmz_auditoria.html';
    }
  } else {
    err.style.display = 'block';
    const card = document.querySelector('.card');
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
    document.getElementById('passInput').value = '';
  }
}
</script>
</body>
</html>
